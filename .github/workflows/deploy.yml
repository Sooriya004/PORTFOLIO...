name: Deploy Market Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd PORTFOLIO/Docker_Projects/Market-Dashboard
          git pull
          docker stop $(docker ps -q) || true
          docker build -t market-dashboard .
          docker run -d -p 5000:5000 --restart unless-stopped market-dashboard
